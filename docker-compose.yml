services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-at-scale-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat_at_scale
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat_at_scale"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
